<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <title>Small Animation</title>

        <style>
            body{
                padding : 100px;
            }

            .div-size-1{
                background-color: transparent;
                width: 10px;
                height: 10px;
                border: 1px dashed black;
                -webkit-border-radius: 50%;
                -moz-border-radius: 50%;
                border-radius: 50%;
            }

            .animation-1{
                -webkit-animation-name: spin;
                -webkit-animation-duration: 1500ms;
                -webkit-animation-iteration-count: infinite;
                -webkit-animation-timing-function: linear;
                -moz-animation-name: spin;
                -moz-animation-duration: 1500ms;
                -moz-animation-iteration-count: infinite;
                -moz-animation-timing-function: linear;
                -ms-animation-name: spin;
                -ms-animation-duration: 1500ms;
                -ms-animation-iteration-count: infinite;
                -ms-animation-timing-function: linear;

                animation-name: spin-small;
                animation-duration: 1500ms;
                animation-iteration-count: infinite;
                animation-timing-function: linear;
            }

            #to-left{
                -webkit-animation-name: to_left;
                -webkit-animation-duration: 1500ms;
                -webkit-animation-iteration-count: infinite;
                -webkit-animation-timing-function: linear;
                -moz-animation-name: to_left;
                -moz-animation-duration: 1500ms;
                -moz-animation-iteration-count: infinite;
                -moz-animation-timing-function: linear;
                -ms-animation-name: to_left;
                -ms-animation-duration: 1500ms;
                -ms-animation-iteration-count: infinite;
                -ms-animation-timing-function: linear;

                animation-name: to_left;
                animation-duration: 1500ms;
                animation-iteration-count: infinite;
                animation-timing-function: linear;
            }

            #to-right{
                -webkit-animation-name: margin_right;
                -webkit-animation-duration: 1500ms;
                -webkit-animation-iteration-count: infinite;
                -webkit-animation-timing-function: linear;
                -moz-animation-name: margin_right;
                -moz-animation-duration: 1500ms;
                -moz-animation-iteration-count: infinite;
                -moz-animation-timing-function: linear;
                -ms-animation-name: margin_right;
                -ms-animation-duration: 1500ms;
                -ms-animation-iteration-count: infinite;
                -ms-animation-timing-function: linear;

                animation-name: margin_right;
                animation-duration: 1500ms;
                animation-iteration-count: infinite;
                animation-timing-function: linear;
            }

            .border-2{
                border: 2px dashed black;
            }

            .border-3{
                border: 3px dashed black;
            }
            
            .border-radius-0{
                -webkit-border-radius: 0;
                -moz-border-radius: 0;
                border-radius: 0;
            }

            .width-20{
                width: 20px;
            }

            .height-20{
                height: 20px;
            }

            .margin-10{
                margin: 10px;
            }

            .float-left{
                float: left;
            }
            .float-right{
                float: right;
            }


            /**/

            @-ms-keyframes spin-small {
                from { -ms-transform: rotate(0deg); }
                to { -ms-transform: rotate(360deg); }
            }
            @-moz-keyframes spin-small {
                from { -moz-transform: rotate(0deg); }
                to { -moz-transform: rotate(360deg); }
            }
            @-webkit-keyframes spin-small {
                from { -webkit-transform: rotate(0deg); }
                to { -webkit-transform: rotate(360deg); }
            }
            @keyframes spin-small {
                from { transform:rotate(0deg); }
                to { transform:rotate(360deg); }
            }

            /**/

            /* TO LEFT */
            @-ms-keyframes to_left {
                from { width: 10px; }
                to   { width: 100px; }
            }
            @-moz-keyframes to_left {
                from { width: 10px; }
                to   { width: 100px; }
            }
            @-webkit-keyframes to_left {
                from { width: 10px; }
                to   { width: 100px; }
            }
            @keyframes to_left {
                from { width: 10px; }
                to   { width: 100px; }
            }

            /* TO RIGHT */
            @-ms-keyframes to_right {
                from { width: 10px; }
                to   { width: 100px; }
            }
            @-moz-keyframes to_right {
                from { width: 10px; }
                to   { width: 100px; }
            }
            @-webkit-keyframes to_right {
                from { width: 10px; }
                to   { width: 100px; }
            }
            @keyframes to_right {
                from { width: 10px; }
                to   { width: 100px; }
            }

            /* MARGIN RIGHT */
            @-ms-keyframes margin_right {
                from { margin-right: 0; }
                to   { margin-right: 100px; }
            }
            @-moz-keyframes margin_right {
                from { margin-right: 0; }
                to   { margin-right: 100px; }
            }
            @-webkit-keyframes margin_right {
                from { margin-right: 0; }
                to   { margin-right: 100px; }
            }
            @keyframes margin_right {
                from { margin-right: 0; }
                to   { margin-right: 100px; }
            }
        </style>

        <script>

        </script>

    </head>
    <body>

        <!-- #1 -->
        <div style="float:left; border: 1px solid black; border-left-width: 5px;">
            <div class="margin-10 float-left animation-1 div-size-1"> </div>
            <div class="margin-10 float-left animation-1 div-size-1 border-2"> </div>
            <div class="margin-10 float-left animation-1 div-size-1 border-3"> </div>
            <div class="margin-10 float-left animation-1 div-size-1 "> </div>
            <div class="margin-10 float-left animation-1 div-size-1 "> </div>
            <div class="margin-10 float-left animation-1 div-size-1 border-2"> </div>
            <div class="margin-10 float-left animation-1 div-size-1 border-3"> </div>
            <div class="margin-10 float-left animation-1 div-size-1 border-radius-0"> </div>
            <div class="margin-10 float-left animation-1 div-size-1 border-radius-0"> </div>
        </div>

        <br><br><br>

        <div style="float:left; border: 1px solid black; width: 500px;">
            <div id="to-left" class="margin-10 float-left width-20 height-20" style="background: green;">  </div>
            <div id="to-right" class="margin-10 float-right width-20 height-20" style="background: red;">   </div>
        </div>
    </body>
</html>
